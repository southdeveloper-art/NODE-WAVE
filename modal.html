<!-- Login & Onboarding Modal -->
<div class="modal-overlay" id="login-modal">
  <div class="login-modal">
    <button class="modal-close" id="modal-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Login View -->
    <div id="login-view-content">
      <div class="modal-header">
        <h2>Connect to NodeWave</h2>
      </div>
      <button class="google-login-btn" id="google-login">
        <svg class="google-icon" viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z">
          </path>
          <path fill="#4285F4"
            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z">
          </path>
          <path fill="#FBBC05"
            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z">
          </path>
          <path fill="#34A853"
            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z">
          </path>
          <path fill="none" d="M0 0h48v48H0z"></path>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Onboarding View -->
    <div id="onboarding-view-content" class="onboarding-form">
      <div class="modal-header">
        <h2>Complete Profile</h2>
        <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.5rem;">Join the NodeWave community
        </p>
      </div>
      <div class="input-group">
        <label>FULL NAME</label>
        <input type="text" id="full-name" class="onboarding-input" placeholder="Enter your full name">
      </div>
      <div class="input-group">
        <label>USERNAME</label>
        <input type="text" id="username" class="onboarding-input" placeholder="@username">
      </div>
      <div class="input-group">
        <label>PHONE NUMBER</label>
        <input type="text" id="phone-number" class="onboarding-input" placeholder="+1 (555) 000-0000">
      </div>
      <button class="save-profile-btn" id="save-profile">Save & Continue</button>
    </div>

    <div class="modal-footer">
      Made by <span class="heart">❤️</span> <a href="https://discord.gg/3VXTcXyRDQ" target="_blank"
        rel="noopener noreferrer"
        style="color: var(--primary); text-decoration: none; font-weight: 700;">rocky._.dev</a>
    </div>
  </div>
</div>
