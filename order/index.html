<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Wave | Complete Your Order</title>
    
    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        html, body { 
            background: #000 !important; 
            color: #fff !important; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body { opacity: 0; transition: opacity 0.5s ease-in; }
        body.loaded { opacity: 1; }

        .order-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .order-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 112, 0, 0.2);
            border-radius: 24px;
            padding: 3.5rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 80px rgba(255, 112, 0, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .order-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .order-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .summary-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .summary-row.total {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            font-weight: 900;
            font-size: 1.8rem;
        }

        .cycle-box {
            margin-bottom: 2.5rem;
        }

        .cycle-box label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .pay-btn {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.3rem;
            font-weight: 900;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(255, 112, 0, 0.3);
        }

        .pay-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 112, 0, 0.5);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body class="has-side-rails">
    <div id="app">
        <header class="navbar" data-include="header.html"></header>

        <main class="order-container">
            <div class="order-card">
                <div class="order-header">
                    <h1>Complete <span class="text-orange">Order</span></h1>
                    <p>Configure your billing cycle and complete payment</p>
                </div>

                <div class="summary-box">
                    <div class="summary-row">
                        <span>Selected Plan</span>
                        <span id="display-plan" style="color: #fff; font-weight: 700;">-</span>
                    </div>
                    
                    <div class="cycle-box">
                        <label>Billing Cycle</label>
                        <select id="billing-cycle" class="cycle-select" style="width: 100%; padding: 1.25rem;">
                            <option value="1">Monthly</option>
                            <option value="3">3 Months (Save 5%)</option>
                            <option value="6">6 Months (Save 10%)</option>
                            <option value="12">12 Months (Save 20%)</option>
                        </select>
                    </div>

                    <div class="summary-row total">
                        <span>Grand Total</span>
                        <span id="display-total">€0</span>
                    </div>
                </div>

                <button id="pay-now-btn" class="pay-btn">Pay with Razorpay</button>
            </div>
        </main>
        <footer class="footer" data-include="footer.html"></footer>
    </div>

    <!-- SDKs -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
